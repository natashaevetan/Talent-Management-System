<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — Dynamic Human Capital</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#F4F5F7;
    --bg-panel:#FFFFFF;
    --border:#E1E4E8;
    --text:#1B2733;
    --muted:#6B7480;
    --blue:#3E7CC2;
    --blue-dark:#2C64A8;
    --blue-tint:#EAF3FC;
    --red-bg:#FBE7E7; --red-text:#B3261E;
    --amber-text:#93600A;
    --green-bg:#E4F5E9; --green-text:#1E7E34; --green-dot:#2E9E4A;
    --amber-dot:#D98C0F; --red-dot:#E24C41;
  }
  html,body{ background:var(--bg-page); color:var(--text); font-family:'Inter',sans-serif; min-height:100%; }
  .field{ border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; width:100%; outline:none; }
  .field:focus{ border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-tint); }
  .pw-field-wrap{ position:relative; }
  .pw-field-wrap .field{ padding-right:38px; }
  .pw-toggle{ position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; padding:4px; cursor:pointer; color:var(--muted); display:flex; }
  .pw-toggle:hover{ color:var(--text); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center py-10">
  <div class="w-full max-w-sm bg-white border border-[var(--border)] rounded-xl shadow-sm p-8">
    <div class="mb-6 text-center">
      <div class="text-lg font-bold" style="color:var(--blue-dark)">Dynamic Human Capital</div>
      <div class="text-sm text-[var(--muted)] mt-1">Create your account</div>
    </div>
    <form id="signupForm" class="space-y-4" novalidate>
      <div>
        <label class="block text-xs font-medium text-[var(--muted)] mb-1">Full Name</label>
        <input id="name" type="text" required class="field" />
      </div>
      <div>
        <label class="block text-xs font-medium text-[var(--muted)] mb-1">Work Email</label>
        <input id="email" type="email" required autocomplete="username" class="field" placeholder="you@dhc.com.sg" />
      </div>
      <div>
        <label class="block text-xs font-medium text-[var(--muted)] mb-1">Password</label>
        <div class="pw-field-wrap">
          <input id="password" type="password" required autocomplete="new-password" class="field" />
          <button type="button" class="pw-toggle" data-target="password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="reqStatus" class="hidden text-xs font-medium flex items-center gap-1.5">
        <span id="reqIcon"></span><span id="reqText"></span>
      </div>
      <div>
        <div class="h-1.5 rounded-full bg-[#EEF0F2] overflow-hidden">
          <div id="strengthBar" class="h-full rounded-full transition-all" style="width:0%;background:var(--red-dot)"></div>
        </div>
        <div id="strengthLabel" class="text-xs font-medium mt-1" style="color:var(--muted)">&nbsp;</div>
      </div>
      <ul id="criteria" class="text-xs space-y-1">
        <li data-rule="length" class="flex items-center gap-1.5" style="color:var(--muted)">○ At least 8 characters</li>
        <li data-rule="lower" class="flex items-center gap-1.5" style="color:var(--muted)">○ One lowercase letter</li>
        <li data-rule="upper" class="flex items-center gap-1.5" style="color:var(--muted)">○ One uppercase letter</li>
        <li data-rule="number" class="flex items-center gap-1.5" style="color:var(--muted)">○ One number</li>
        <li data-rule="special" class="flex items-center gap-1.5" style="color:var(--muted)">○ One special character (e.g. ! @ # $ %)</li>
      </ul>
      <div>
        <label class="block text-xs font-medium text-[var(--muted)] mb-1">Confirm Password</label>
        <div class="pw-field-wrap">
          <input id="confirm" type="password" required autocomplete="new-password" class="field" />
          <button type="button" class="pw-toggle" data-target="confirm" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="matchStatus" class="hidden text-xs font-medium flex items-center gap-1.5">
        <span id="matchIcon"></span><span id="matchText"></span>
      </div>
      <div id="signupError" class="hidden text-sm rounded-lg px-3 py-2" style="background:var(--red-bg);color:var(--red-text)"></div>
      <button type="submit" id="signupBtn" disabled class="w-full rounded-lg py-2.5 text-sm font-semibold text-white disabled:opacity-40 disabled:cursor-not-allowed" style="background:var(--blue)">
        Create Account
      </button>
    </form>
    <div class="text-center text-sm text-[var(--muted)] mt-5">
      Already have an account? <a href="/login.html" class="font-medium" style="color:var(--blue)">Sign in</a>
    </div>
  </div>

<script>
  const EYE_ICON = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_OFF_ICON = '<path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a20.3 20.3 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a20.3 20.3 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  document.querySelectorAll('.pw-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = showing ? EYE_ICON : EYE_OFF_ICON;
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
  });

  function evaluatePassword(pw){
    return {
      length: pw.length >= 8,
      lower: /[a-z]/.test(pw),
      upper: /[A-Z]/.test(pw),
      number: /[0-9]/.test(pw),
      special: /[^A-Za-z0-9]/.test(pw),
    };
  }
  function passwordStrength(rules){
    const metCount = Object.values(rules).filter(Boolean).length;
    if(metCount <= 2) return { label: 'Weak', color: 'var(--red-dot)', textColor: 'var(--red-text)', pct: 20 };
    if(metCount <= 4) return { label: 'Moderate', color: 'var(--amber-dot)', textColor: 'var(--amber-text)', pct: 60 };
    return { label: 'Strong', color: 'var(--green-dot)', textColor: 'var(--green-text)', pct: 100 };
  }
  function setStatusRow(prefix, state, text){
    const row = document.getElementById(prefix + 'Status');
    const icon = document.getElementById(prefix + 'Icon');
    const label = document.getElementById(prefix + 'Text');
    if(!state){ row.classList.add('hidden'); return; }
    row.classList.remove('hidden');
    const meta = {
      red: { symbol: '✗', color: 'var(--red-text)' },
      amber: { symbol: '✗', color: 'var(--amber-text)' },
      green: { symbol: '✓', color: 'var(--green-text)' },
    }[state];
    icon.textContent = meta.symbol;
    icon.style.color = meta.color;
    label.style.color = meta.color;
    label.textContent = text;
  }

  function updateChecklist(){
    const pw = document.getElementById('password').value;
    const confirmPw = document.getElementById('confirm').value;
    const rules = evaluatePassword(pw);
    document.querySelectorAll('#criteria li[data-rule]').forEach(li=>{
      const met = rules[li.dataset.rule];
      li.style.color = met ? 'var(--green-text)' : 'var(--muted)';
      li.textContent = (met ? '✓ ' : '○ ') + li.textContent.slice(2);
    });
    const metCount = Object.values(rules).filter(Boolean).length;
    const allMet = metCount === 5;
    const bar = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');
    if(pw.length === 0){
      bar.style.width = '0%';
      label.textContent = ' ';
      setStatusRow('req', null);
    } else {
      const s = passwordStrength(rules);
      bar.style.width = s.pct + '%';
      bar.style.background = s.color;
      label.textContent = s.label;
      label.style.color = s.textColor;
      if(allMet) setStatusRow('req', 'green', 'Meets all requirements');
      else if(metCount >= 3) setStatusRow('req', 'amber', 'Almost there — not all requirements met');
      else setStatusRow('req', 'red', 'Does not meet requirements');
    }

    if(confirmPw.length === 0){
      setStatusRow('match', null);
    } else if(confirmPw === pw){
      setStatusRow('match', 'green', 'Passwords match');
    } else {
      setStatusRow('match', 'red', 'Passwords do not match');
    }

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const passwordsMatch = confirmPw.length > 0 && confirmPw === pw;
    document.getElementById('signupBtn').disabled = !(allMet && passwordsMatch && name && email);
  }
  document.getElementById('password').addEventListener('input', updateChecklist);
  document.getElementById('confirm').addEventListener('input', updateChecklist);
  document.getElementById('name').addEventListener('input', updateChecklist);
  document.getElementById('email').addEventListener('input', updateChecklist);

  document.getElementById('signupForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errorEl = document.getElementById('signupError');
    const btn = document.getElementById('signupBtn');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = "Creating account…";
    try{
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      if(!res.ok){
        const body = await res.json().catch(()=>({}));
        throw new Error(body.error || 'Sign up failed');
      }
      window.location.href = '/';
    }catch(err){
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = "Create Account";
    }
  });
</script>
</body>
</html>
