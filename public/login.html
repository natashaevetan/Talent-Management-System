<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Dynamic Human Capital</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#18191A;
    --text:#E4E6EB;
    --muted:#8A8D91;
    --border:#3E4042;
    --blue:#3E7CC2;
    --blue-dark:#2C64A8;
    --red-bg:#3A1F1F; --red-text:#F87171;
  }
  html,body{ background:var(--bg-page); color:var(--text); font-family:'Inter',sans-serif; height:100%; }
  .field{ background:var(--bg-page); border:1px solid var(--border); border-radius:999px; padding:14px 20px; font-size:15px; width:100%; outline:none; color:var(--text); }
  .field::placeholder{ color:var(--muted); }
  .field:focus{ border-color:#6B6E72; }
  .pw-field-wrap{ position:relative; }
  .pw-field-wrap .field{ padding-right:46px; }
  .pw-toggle{ position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; padding:4px; cursor:pointer; color:var(--muted); display:flex; }
  .pw-toggle:hover{ color:var(--text); }
  .btn-primary{ width:100%; border-radius:999px; padding:13px; font-size:15px; font-weight:600; background:var(--blue); color:#fff; border:none; cursor:pointer; transition:background .15s; }
  .btn-primary:hover{ background:var(--blue-dark); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }
  .btn-outline{ display:block; width:100%; text-align:center; border-radius:999px; padding:12px; font-size:15px; font-weight:600; background:transparent; color:var(--blue); border:1px solid var(--blue); text-decoration:none; transition:background .15s; }
  .btn-outline:hover{ background:rgba(62,124,194,0.12); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <div class="text-2xl font-bold text-white">Dynamic Human Capital</div>
      <div class="text-sm mt-1" style="color:var(--muted)">Talent Management System</div>
    </div>

    <form id="loginForm" class="space-y-3">
      <input id="email" type="email" required autocomplete="username" class="field" placeholder="Work email" />
      <div class="pw-field-wrap">
        <input id="password" type="password" required autocomplete="current-password" class="field" placeholder="Password" />
        <button type="button" class="pw-toggle" data-target="password" aria-label="Show password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="loginError" class="hidden text-sm rounded-lg px-3 py-2 text-center" style="background:var(--red-bg);color:var(--red-text)"></div>
      <button type="submit" id="loginBtn" class="btn-primary mt-1">
        Log in
      </button>
    </form>

    <div class="text-center mt-5">
      <a href="/forgot-password.html" class="text-sm hover:underline" style="color:var(--muted)">Forgot password?</a>
    </div>

    <div class="my-6 border-t" style="border-color:var(--border)"></div>

    <a href="/signup.html" class="btn-outline">Create new account</a>

    <div class="text-center mt-8 text-xs" style="color:var(--muted)">Dynamic Human Capital</div>
  </div>

<script>
  const EYE_ICON = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_OFF_ICON = '<path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a20.3 20.3 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a20.3 20.3 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  document.querySelectorAll('.pw-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = showing ? EYE_ICON : EYE_OFF_ICON;
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
  });

  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = "Logging in…";
    try{
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      if(!res.ok){
        const body = await res.json().catch(()=>({}));
        throw new Error(body.error || 'Log in failed');
      }
      window.location.href = '/';
    }catch(err){
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }finally{
      btn.disabled = false;
      btn.textContent = "Log in";
    }
  });
</script>
</body>
</html>
