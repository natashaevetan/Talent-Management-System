<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Dynamic Human Capital</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#F4F5F7;
    --bg-panel:#FFFFFF;
    --border:#E1E4E8;
    --text:#1B2733;
    --muted:#6B7480;
    --blue:#3E7CC2;
    --blue-dark:#2C64A8;
    --blue-tint:#EAF3FC;
    --red-bg:#FBE7E7; --red-text:#B3261E;
  }
  html,body{ background:var(--bg-page); color:var(--text); font-family:'Inter',sans-serif; height:100%; }
  .field{ border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; width:100%; outline:none; }
  .field:focus{ border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-tint); }
  .pw-field-wrap{ position:relative; }
  .pw-field-wrap .field{ padding-right:38px; }
  .pw-toggle{ position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; padding:4px; cursor:pointer; color:var(--muted); display:flex; }
  .pw-toggle:hover{ color:var(--text); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white border border-[var(--border)] rounded-xl shadow-sm p-8">
    <div class="mb-6 text-center">
      <div class="text-lg font-bold" style="color:var(--blue-dark)">Dynamic Human Capital</div>
      <div class="text-sm text-[var(--muted)] mt-1">Talent Management System</div>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-[var(--muted)] mb-1">Email</label>
        <input id="email" type="email" required autocomplete="username" class="field" />
      </div>
      <div>
        <label class="block text-xs font-medium text-[var(--muted)] mb-1">Password</label>
        <div class="pw-field-wrap">
          <input id="password" type="password" required autocomplete="current-password" class="field" />
          <button type="button" class="pw-toggle" data-target="password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="loginError" class="hidden text-sm rounded-lg px-3 py-2" style="background:var(--red-bg);color:var(--red-text)"></div>
      <button type="submit" id="loginBtn" class="w-full rounded-lg py-2.5 text-sm font-semibold text-white" style="background:var(--blue)">
        Sign in
      </button>
    </form>
  </div>

<script>
  const EYE_ICON = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_OFF_ICON = '<path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a20.3 20.3 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a20.3 20.3 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  document.querySelectorAll('.pw-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = showing ? EYE_ICON : EYE_OFF_ICON;
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
  });

  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = "Signing in…";
    try{
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      if(!res.ok){
        const body = await res.json().catch(()=>({}));
        throw new Error(body.error || 'Sign in failed');
      }
      window.location.href = '/';
    }catch(err){
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }finally{
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  });
</script>
</body>
</html>
