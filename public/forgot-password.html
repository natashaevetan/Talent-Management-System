<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password — Talent Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#F4F5F7; --text:#1B2733; --muted:#6B7480; --border:#E1E4E8;
    --blue:#3E7CC2; --blue-dark:#2C64A8;
    --red-bg:#FBE7E7; --red-text:#B3261E; --green-bg:#E4F5E9; --green-text:#1E7E34;
  }
  html,body{ background:var(--bg-page); color:var(--text); font-family:'Inter',sans-serif; height:100%; }
  .field{ background:#fff; border:1px solid var(--border); border-radius:999px; padding:14px 20px; font-size:15px; width:100%; outline:none; color:var(--text); }
  .field::placeholder{ color:var(--muted); }
  .field:focus{ border-color:var(--blue); }
  .btn-primary{ width:100%; border-radius:999px; padding:13px; font-size:15px; font-weight:600; background:var(--blue); color:#fff; border:none; cursor:pointer; transition:background .15s; }
  .btn-primary:hover{ background:var(--blue-dark); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <div class="text-2xl font-bold">Talent Management System</div>
      <div class="text-sm mt-1" style="color:var(--muted)">Reset your password</div>
    </div>

    <form id="forgotForm" class="space-y-3">
      <input id="email" type="email" required autocomplete="username" class="field" placeholder="Work email" />
      <div id="formError" class="hidden text-sm rounded-lg px-3 py-2 text-center" style="background:var(--red-bg);color:var(--red-text)"></div>
      <div id="formSuccess" class="hidden text-sm rounded-lg px-3 py-2 text-center" style="background:var(--green-bg);color:var(--green-text)"></div>
      <button type="submit" id="submitBtn" class="btn-primary mt-1">
        Send Reset Link
      </button>
    </form>

    <div class="text-center text-sm mt-6" style="color:var(--muted)">
      <a href="/login.html" class="font-medium" style="color:var(--blue)">Back to log in</a>
    </div>
  </div>

<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errorEl = document.getElementById('formError');
    const successEl = document.getElementById('formSuccess');
    const btn = document.getElementById('submitBtn');
    errorEl.classList.add('hidden');
    successEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = "Sending…";
    try{
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
      });
      if(!res.ok){
        const body = await res.json().catch(()=>({}));
        throw new Error(body.error || 'Something went wrong');
      }
      successEl.textContent = "If an account exists for that email, a reset link has been sent. Check your inbox.";
      successEl.classList.remove('hidden');
      btn.textContent = "Sent";
    }catch(err){
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = "Send Reset Link";
    }
  });
</script>
</body>
</html>
