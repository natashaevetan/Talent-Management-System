<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password — Dynamic Human Capital</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#F4F5F7; --bg-panel:#FFFFFF; --border:#E1E4E8; --text:#1B2733; --muted:#6B7480;
    --blue:#3E7CC2; --blue-dark:#2C64A8; --blue-tint:#EAF3FC;
    --red-bg:#FBE7E7; --red-text:#B3261E; --green-bg:#E4F5E9; --green-text:#1E7E34;
  }
  html,body{ background:var(--bg-page); color:var(--text); font-family:'Inter',sans-serif; height:100%; }
  .field{ border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; width:100%; outline:none; }
  .field:focus{ border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-tint); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white border border-[var(--border)] rounded-xl shadow-sm p-8">
    <div class="mb-6 text-center">
      <div class="text-lg font-bold" style="color:var(--blue-dark)">Dynamic Human Capital</div>
      <div class="text-sm text-[var(--muted)] mt-1">Reset your password</div>
    </div>
    <form id="forgotForm" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-[var(--muted)] mb-1">Email</label>
        <input id="email" type="email" required autocomplete="username" class="field" />
      </div>
      <div id="formError" class="hidden text-sm rounded-lg px-3 py-2" style="background:var(--red-bg);color:var(--red-text)"></div>
      <div id="formSuccess" class="hidden text-sm rounded-lg px-3 py-2" style="background:var(--green-bg);color:var(--green-text)"></div>
      <button type="submit" id="submitBtn" class="w-full rounded-lg py-2.5 text-sm font-semibold text-white" style="background:var(--blue)">
        Send Reset Link
      </button>
    </form>
    <div class="text-center text-sm text-[var(--muted)] mt-5">
      <a href="/login.html" class="font-medium" style="color:var(--blue)">Back to sign in</a>
    </div>
  </div>

<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errorEl = document.getElementById('formError');
    const successEl = document.getElementById('formSuccess');
    const btn = document.getElementById('submitBtn');
    errorEl.classList.add('hidden');
    successEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = "Sending…";
    try{
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
      });
      if(!res.ok){
        const body = await res.json().catch(()=>({}));
        throw new Error(body.error || 'Something went wrong');
      }
      successEl.textContent = "If an account exists for that email, a reset link has been sent. Check your inbox.";
      successEl.classList.remove('hidden');
      btn.textContent = "Sent";
    }catch(err){
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = "Send Reset Link";
    }
  });
</script>
</body>
</html>
