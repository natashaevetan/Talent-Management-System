<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — Dynamic Human Capital</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#18191A; --text:#E4E6EB; --muted:#8A8D91; --border:#3E4042;
    --blue:#3E7CC2; --blue-dark:#2C64A8;
    --red-bg:#3A1F1F; --red-text:#F87171; --amber-text:#FBBF24;
    --green-bg:#1F3A24; --green-text:#4ADE80; --green-dot:#4ADE80;
    --amber-dot:#FBBF24; --red-dot:#F87171;
  }
  html,body{ background:var(--bg-page); color:var(--text); font-family:'Inter',sans-serif; min-height:100%; }
  .field{ background:var(--bg-page); border:1px solid var(--border); border-radius:999px; padding:14px 20px; font-size:15px; width:100%; outline:none; color:var(--text); }
  .field::placeholder{ color:var(--muted); }
  .field:focus{ border-color:#6B6E72; }
  .pw-field-wrap{ position:relative; }
  .pw-field-wrap .field{ padding-right:46px; }
  .pw-toggle{ position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; padding:4px; cursor:pointer; color:var(--muted); display:flex; }
  .pw-toggle:hover{ color:var(--text); }
  .btn-primary{ width:100%; border-radius:999px; padding:13px; font-size:15px; font-weight:600; background:var(--blue); color:#fff; border:none; cursor:pointer; transition:background .15s; }
  .btn-primary:hover{ background:var(--blue-dark); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <div class="text-2xl font-bold text-white">Dynamic Human Capital</div>
      <div class="text-sm mt-1" style="color:var(--muted)">Set a new password</div>
    </div>

    <div id="noTokenMsg" class="hidden text-sm rounded-lg px-3 py-2 mb-4 text-center" style="background:var(--red-bg);color:var(--red-text)">
      This link is missing its reset token. Request a new one from the <a href="/forgot-password.html" class="underline">forgot password</a> page.
    </div>

    <form id="resetForm" class="space-y-3" novalidate>
      <div class="pw-field-wrap">
        <input id="password" type="password" required autocomplete="new-password" class="field" placeholder="New password" />
        <button type="button" class="pw-toggle" data-target="password" aria-label="Show password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="reqStatus" class="hidden text-xs font-medium flex items-center gap-1.5 px-2">
        <span id="reqIcon"></span><span id="reqText"></span>
      </div>
      <div class="px-2">
        <div class="h-1.5 rounded-full overflow-hidden" style="background:var(--border)">
          <div id="strengthBar" class="h-full rounded-full transition-all" style="width:0%;background:var(--red-dot)"></div>
        </div>
        <div id="strengthLabel" class="text-xs font-medium mt-1" style="color:var(--muted)">&nbsp;</div>
      </div>
      <ul id="criteria" class="text-xs space-y-1 px-2">
        <li data-rule="length" class="flex items-center gap-1.5" style="color:var(--muted)">○ At least 8 characters</li>
        <li data-rule="lower" class="flex items-center gap-1.5" style="color:var(--muted)">○ One lowercase letter</li>
        <li data-rule="upper" class="flex items-center gap-1.5" style="color:var(--muted)">○ One uppercase letter</li>
        <li data-rule="number" class="flex items-center gap-1.5" style="color:var(--muted)">○ One number</li>
        <li data-rule="special" class="flex items-center gap-1.5" style="color:var(--muted)">○ One special character (e.g. ! @ # $ %)</li>
      </ul>
      <div class="pw-field-wrap">
        <input id="confirm" type="password" required autocomplete="new-password" class="field" placeholder="Confirm new password" />
        <button type="button" class="pw-toggle" data-target="confirm" aria-label="Show password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="matchStatus" class="hidden text-xs font-medium flex items-center gap-1.5 px-2">
        <span id="matchIcon"></span><span id="matchText"></span>
      </div>
      <div id="formError" class="hidden text-sm rounded-lg px-3 py-2 text-center" style="background:var(--red-bg);color:var(--red-text)"></div>
      <button type="submit" id="submitBtn" disabled class="btn-primary mt-1">
        Reset Password
      </button>
    </form>
  </div>

<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if(!token){
    document.getElementById('noTokenMsg').classList.remove('hidden');
    document.getElementById('resetForm').classList.add('hidden');
  }

  const EYE_ICON = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_OFF_ICON = '<path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a20.3 20.3 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a20.3 20.3 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  document.querySelectorAll('.pw-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = showing ? EYE_ICON : EYE_OFF_ICON;
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
  });

  function evaluatePassword(pw){
    return {
      length: pw.length >= 8,
      lower: /[a-z]/.test(pw),
      upper: /[A-Z]/.test(pw),
      number: /[0-9]/.test(pw),
      special: /[^A-Za-z0-9]/.test(pw),
    };
  }
  function passwordStrength(rules){
    const metCount = Object.values(rules).filter(Boolean).length;
    if(metCount <= 2) return { label: 'Weak', color: 'var(--red-dot)', textColor: 'var(--red-text)', pct: 20 };
    if(metCount <= 4) return { label: 'Moderate', color: 'var(--amber-dot)', textColor: 'var(--amber-text)', pct: 60 };
    return { label: 'Strong', color: 'var(--green-dot)', textColor: 'var(--green-text)', pct: 100 };
  }
  function setStatusRow(prefix, state, text){
    const row = document.getElementById(prefix + 'Status');
    const icon = document.getElementById(prefix + 'Icon');
    const label = document.getElementById(prefix + 'Text');
    if(!state){ row.classList.add('hidden'); return; }
    row.classList.remove('hidden');
    const meta = {
      red: { symbol: '✗', color: 'var(--red-text)' },
      amber: { symbol: '✗', color: 'var(--amber-text)' },
      green: { symbol: '✓', color: 'var(--green-text)' },
    }[state];
    icon.textContent = meta.symbol;
    icon.style.color = meta.color;
    label.style.color = meta.color;
    label.textContent = text;
  }

  function updateChecklist(){
    const pw = document.getElementById('password').value;
    const confirmPw = document.getElementById('confirm').value;
    const rules = evaluatePassword(pw);
    document.querySelectorAll('#criteria li[data-rule]').forEach(li=>{
      const met = rules[li.dataset.rule];
      li.style.color = met ? 'var(--green-text)' : 'var(--muted)';
      li.textContent = (met ? '✓ ' : '○ ') + li.textContent.slice(2);
    });
    const metCount = Object.values(rules).filter(Boolean).length;
    const allMet = metCount === 5;
    const bar = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');
    if(pw.length === 0){
      bar.style.width = '0%';
      label.textContent = ' ';
      setStatusRow('req', null);
    } else {
      const s = passwordStrength(rules);
      bar.style.width = s.pct + '%';
      bar.style.background = s.color;
      label.textContent = s.label;
      label.style.color = s.textColor;
      if(allMet) setStatusRow('req', 'green', 'Meets all requirements');
      else if(metCount >= 3) setStatusRow('req', 'amber', 'Almost there — not all requirements met');
      else setStatusRow('req', 'red', 'Does not meet requirements');
    }

    if(confirmPw.length === 0){
      setStatusRow('match', null);
    } else if(confirmPw === pw){
      setStatusRow('match', 'green', 'Passwords match');
    } else {
      setStatusRow('match', 'red', 'Passwords do not match');
    }

    const passwordsMatch = confirmPw.length > 0 && confirmPw === pw;
    document.getElementById('submitBtn').disabled = !(allMet && passwordsMatch);
  }
  document.getElementById('password').addEventListener('input', updateChecklist);
  document.getElementById('confirm').addEventListener('input', updateChecklist);

  document.getElementById('resetForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errorEl = document.getElementById('formError');
    const btn = document.getElementById('submitBtn');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = "Resetting…";
    try{
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: document.getElementById('password').value }),
      });
      if(!res.ok){
        const body = await res.json().catch(()=>({}));
        throw new Error(body.error || 'Something went wrong');
      }
      window.location.href = '/login.html';
    }catch(err){
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = "Reset Password";
    }
  });
</script>
</body>
</html>
